<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marvicons</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f7;
      --surface: #fff;
      --border: #e4e4e4;
      --border-hover: #bbb;
      --text: #111;
      --text-muted: #888;
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
      --toast-bg: #111;
      --toast-fg: #fff;
      --code-bg: #f3f3f3;
      --default-icon-color: #111111;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141414;
        --surface: #1e1e1e;
        --border: #2e2e2e;
        --border-hover: #555;
        --text: #ebebeb;
        --text-muted: #666;
        --shadow-hover: 0 4px 12px rgba(0,0,0,0.4);
        --toast-bg: #ebebeb;
        --toast-fg: #111;
        --code-bg: #141414;
        --default-icon-color: #ebebeb;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 48px 40px 0;
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .toolbar {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search {
      flex: 1;
      max-width: 320px;
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .search input::placeholder { color: var(--text-muted); }
    .search input:focus { border-color: var(--border-hover); }

    .count {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    main {
      padding: 28px 40px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Detail panel ───────────────────────────────────── */

    .detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 28px;
      align-items: flex-start;
      position: relative;
      animation: detail-in 0.15s ease;
    }

    @keyframes detail-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-preview {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .detail-preview svg {
      width: 80px;
      height: 80px;
    }

    .detail-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .detail-name {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .detail-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-swatch-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .color-swatch-wrap input[type="color"] {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      background: var(--surface);
      cursor: pointer;
    }

    .btn {
      padding: 6px 12px;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }

    .btn:hover { border-color: var(--border-hover); }

    .btn-active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .detail-code {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      overflow-x: auto;
      white-space: pre;
      color: var(--text);
    }

    .detail-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 26px;
      height: 26px;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .detail-close:hover {
      color: var(--text);
      background: var(--bg);
    }

    /* ── Grid ───────────────────────────────────────────── */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px;
    }

    .icon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 10px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      user-select: none;
    }

    .icon-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-1px);
    }

    .icon-card:active { transform: translateY(0); }

    .icon-card.selected {
      border-color: var(--text);
    }

    .icon-card svg {
      width: 24px;
      height: 24px;
      color: var(--text);
      flex-shrink: 0;
    }

    .icon-name {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 60px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* ── Toast ──────────────────────────────────────────── */

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--toast-bg);
      color: var(--toast-fg);
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <header>
    <h1>Marvicons</h1>
    <p class="subtitle">A collection of simple SVG icons.</p>
    <div class="toolbar">
      <div class="search">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search" placeholder="Search icons…" autocomplete="off" spellcheck="false">
      </div>
      <span class="count" id="count"></span>
    </div>
  </header>

  <main>
    <div id="detail-wrap"></div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const grid      = document.getElementById('grid');
    const detailWrap = document.getElementById('detail-wrap');
    const search    = document.getElementById('search');
    const countEl   = document.getElementById('count');
    const toast     = document.getElementById('toast');

    // Pick a sensible default color for the picker based on color scheme
    const defaultColor = window.matchMedia('(prefers-color-scheme: dark)').matches
      ? '#ebebeb' : '#111111';

    let cards = [];
    let selectedCard = null;
    let toastTimer;

    // ── Toast helper ────────────────────────────────────
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    // ── Count ────────────────────────────────────────────
    function updateCount(visible) {
      countEl.textContent = visible === cards.length
        ? `${cards.length} icons`
        : `${visible} of ${cards.length}`;
    }

    // ── Detail panel ─────────────────────────────────────
    function openDetail(card) {
      // Deselect previous
      if (selectedCard && selectedCard !== card) {
        selectedCard.classList.remove('selected');
      }

      // Toggle closed if clicking the same card
      if (selectedCard === card && detailWrap.firstChild) {
        closeDetail();
        return;
      }

      selectedCard = card;
      card.classList.add('selected');

      const name    = card.dataset.name;
      const svgText = card._svgText;

      // Build panel
      const panel = document.createElement('div');
      panel.className = 'detail';

      // Preview
      const preview = document.createElement('div');
      preview.className = 'detail-preview';
      preview.style.color = defaultColor;
      preview.innerHTML = svgText;

      // Body
      const body = document.createElement('div');
      body.className = 'detail-body';

      const nameEl = document.createElement('span');
      nameEl.className = 'detail-name';
      nameEl.textContent = name;

      // Controls row
      const controls = document.createElement('div');
      controls.className = 'detail-controls';

      const colorWrap = document.createElement('label');
      colorWrap.className = 'color-swatch-wrap';
      colorWrap.textContent = 'Color\u00a0';
      const colorPicker = document.createElement('input');
      colorPicker.type = 'color';
      colorPicker.value = defaultColor;
      colorPicker.addEventListener('input', () => {
        preview.style.color = colorPicker.value;
      });
      colorWrap.appendChild(colorPicker);

      const copyNameBtn = document.createElement('button');
      copyNameBtn.className = 'btn';
      copyNameBtn.textContent = 'Copy name';
      copyNameBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(name).then(() => showToast(`Copied "${name}"`));
      });

      const copySvgBtn = document.createElement('button');
      copySvgBtn.className = 'btn';
      copySvgBtn.textContent = 'Copy SVG';
      copySvgBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(svgText).then(() => showToast('SVG copied'));
      });

      const showCodeBtn = document.createElement('button');
      showCodeBtn.className = 'btn';
      showCodeBtn.textContent = 'Show code';

      controls.append(colorWrap, copyNameBtn, copySvgBtn, showCodeBtn);

      // Code block
      const codeEl = document.createElement('pre');
      codeEl.className = 'detail-code';
      codeEl.textContent = svgText;
      codeEl.hidden = true;

      showCodeBtn.addEventListener('click', () => {
        const visible = codeEl.hidden;
        codeEl.hidden = !visible;
        showCodeBtn.textContent = visible ? 'Hide code' : 'Show code';
        showCodeBtn.classList.toggle('btn-active', visible);
      });

      body.append(nameEl, controls, codeEl);

      // Close button
      const closeBtn = document.createElement('button');
      closeBtn.className = 'detail-close';
      closeBtn.innerHTML = '&#x2715;';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.addEventListener('click', closeDetail);

      panel.append(preview, body, closeBtn);

      // Swap in
      detailWrap.innerHTML = '';
      detailWrap.appendChild(panel);
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeDetail() {
      detailWrap.innerHTML = '';
      if (selectedCard) {
        selectedCard.classList.remove('selected');
        selectedCard = null;
      }
    }

    // ── Search ───────────────────────────────────────────
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      let visible = 0;
      cards.forEach(card => {
        const match = !q || card.dataset.name.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });

      let empty = grid.querySelector('.empty');
      if (visible === 0) {
        if (!empty) {
          empty = document.createElement('p');
          empty.className = 'empty';
          grid.appendChild(empty);
        }
        empty.textContent = `No icons matching "${search.value.trim()}"`;
      } else if (empty) {
        empty.remove();
      }

      updateCount(visible);
    });

    // ── Load icons ───────────────────────────────────────
    async function loadIcons() {
      const names = await fetch('icons.json').then(r => r.json());

      const results = await Promise.all(names.map(async name => {
        const svgText = await fetch(`icons/${name}.svg`).then(r => r.text());
        const card = document.createElement('div');
        card.className = 'icon-card';
        card.dataset.name = name;
        card._svgText = svgText;
        card.innerHTML = svgText + `<span class="icon-name">${name}</span>`;
        card.addEventListener('click', () => openDetail(card));
        return card;
      }));

      results.forEach(card => grid.appendChild(card));
      cards = results;
      updateCount(cards.length);
    }

    loadIcons();
  </script>
</body>
</html>
