<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mask to erase droplet lines where the clock sits -->
    <mask id="cutout">
      <!-- White = visible, Black = hidden -->
      <rect width="24" height="24" fill="white"/>
      <circle cx="17.5" cy="17.5" r="4" fill="black"/>
    </mask>
  </defs>

  <!-- Droplet outline (masked) -->
  <path 
    d="M12 2C12 2 5 10 5 14.5C5 18.09 8.13 21 12 21C15.87 21 19 18.09 19 14.5C19 10 12 2 12 2Z"
    stroke="#000"
    stroke-width="1.5"
    fill="none"
    mask="url(#cutout)"
  />

  <!-- Clock outline -->
  <circle cx="17.5" cy="17.5" r="4" stroke="#000" stroke-width="1.5" fill="none"/>

  <!-- Clock hands -->
  <line x1="17.5" y1="17.5" x2="17.5" y2="15.5" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17.5" y1="17.5" x2="19" y2="17.5" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
</svg>
